name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Prepare Project
        run: |
          set -e
          # Get dependencies first to populate pub-cache
          flutter pub get
          
          # Fix Namespace issue for dash_bubble and other potential libraries
          echo "Fixing namespaces in pub-cache..."
          find ~/.pub-cache -name "build.gradle" -exec sed -i '/android {/a \    namespace "com.example.fix"' {} +
          
          # Setup build directory
          rm -rf /tmp/clean_project
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean_project
          cd /tmp/clean_project
          
          # Copy source files
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # Wait for android/app/build.gradle to exist
          until [ -f "android/app/build.gradle" ]; do
            echo "Waiting for android/app/build.gradle to be created..."
            sleep 5
          done

          # Patch app/build.gradle
          # Ensure namespace is set in the app itself
          sed -i 's/namespace .*/namespace "com.tetocollctionway.mirror_scorpion_translate"/g' android/app/build.gradle
          
          # Apply user patches if they exist
          if [ -f "$GITHUB_WORKSPACE/scripts/patch_gradle.py" ]; then
            python3 $GITHUB_WORKSPACE/scripts/patch_gradle.py android/app/build.gradle
          fi
          
          # Build APK
          flutter pub get
          flutter build apk --release
          
          # Move output to workspace
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
