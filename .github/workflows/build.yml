name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'
      - name: Create project
        run: flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean
      - name: Copy files
        run: |
          rm -rf /tmp/clean/lib /tmp/clean/assets
          cp -r lib /tmp/clean/
          cp -r assets /tmp/clean/
          cp pubspec.yaml /tmp/clean/
      - name: Configure Android
        run: |
          python3 << 'PYEOF'
import os
# build.gradle
with open('/tmp/clean/android/app/build.gradle', 'w') as f:
    f.write('''plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}
android {
    namespace "com.tetocollctionway.mirror_scorpion_translate"
    compileSdk 34
    ndkVersion flutter.ndkVersion
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions { jvmTarget = "1.8" }
    sourceSets { main.java.srcDirs += "src/main/kotlin" }
    defaultConfig {
        applicationId "com.tetocollctionway.mirror_scorpion_translate"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes { release { signingConfig signingConfigs.debug } }
}
flutter { source "../.." }
dependencies {}
''')
# AndroidManifest.xml - v2 embedding
with open('/tmp/clean/android/app/src/main/AndroidManifest.xml', 'w') as f:
    f.write('<manifest xmlns:android="http://schemas.android.com/apk/res/android">\\n')
    f.write('<uses-permission android:name="android.permission.INTERNET"/>\\n')
    f.write('<uses-permission android:name="android.permission.RECORD_AUDIO"/>\\n')
    f.write('<application android:label="Mirror Scription" android:name="io.flutter.embedding.android.FlutterActivity" android:icon="@mipmap/ic_launcher">\\n')
    f.write('<activity android:name=".MainActivity" android:exported="true" android:launchMode="singleTop" android:theme="@style/LaunchTheme" android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode" android:hardwareAccelerated="true" android:windowSoftInputMode="adjustResize">\\n')
    f.write('<intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>\\n')
    f.write('</activity>\\n')
    f.write('<meta-data android:name="flutterEmbedding" android:value="2"/>\\n')
    f.write('</application>\\n')
    f.write('</manifest>\\n')
print('Android config done')
PYEOF
      - name: Build
        run: |
          cd /tmp/clean
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: ignore
