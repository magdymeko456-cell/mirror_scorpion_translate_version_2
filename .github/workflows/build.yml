name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Build Project
        run: |
          cd ..
          # 1. إنشاء مشروع نظيف بأحدث المعايير
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate clean_project
          rm -rf clean_project/lib clean_project/assets clean_project/pubspec.yaml clean_project/android/app/build.gradle
          
          # 2. نقل ملفاتك النظيفة
          cp -r mirror_scorpion_translate1/lib clean_project/
          cp -r mirror_scorpion_translate1/assets clean_project/
          cp mirror_scorpion_translate1/pubspec.yaml clean_project/

          # 3. استبدال الجرادل بالملف الموحد الحديث والمكتوب صح
          cp mirror_scorpion_translate1/android_config/app/build.gradle clean_project/android/app/build.gradle

          # 4. قاعدة ذهبية شاملة لإلزام أي مكتبة خارجية (مثل speech_to_text) بالإصدار الحديث 34
          echo "subprojects { afterEvaluate { project -> if (project.hasProperty('android')) { project.android { compileSdkVersion 34; buildToolsVersion '34.0.0' } } } }" >> clean_project/android/build.gradle

          # 5. البناء النهائي
          cd clean_project
          flutter pub get
          flutter build apk --release

          mkdir -p ../mirror_scorpion_translate1/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk ../mirror_scorpion_translate1/output_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
