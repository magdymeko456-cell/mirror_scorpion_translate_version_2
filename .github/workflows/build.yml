name: Mirror Scorpion Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Create clean project
        run: flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean_project

      - name: Copy our code
        run: |
          rm -rf /tmp/clean_project/lib /tmp/clean_project/assets
          cp -r lib /tmp/clean_project/
          cp -r assets /tmp/clean_project/
          cp pubspec.yaml /tmp/clean_project/

      - name: Configure Android for v2 embedding
        run: |
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' /tmp/clean_project/android/app/build.gradle
          sed -i 's|<application>|<application android:name="io.flutter.embedding.android.FlutterActivity">|' /tmp/clean_project/android/app/src/main/AndroidManifest.xml
          sed -i '/<\/application>/i\        <meta-data android:name="flutterEmbedding" android:value="2" />' /tmp/clean_project/android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd /tmp/clean_project
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: ignore
