name: Mirror Scorpion Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subos: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'

      - name: Build APK
        working-directory: ${{ github.workspace }}
        run: |
          # 1. إنشاء مشروع Flutter نظيف
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate ../clean_project

          # 2. مسح lib و assets الافتراضية
          rm -rf ../clean_project/lib ../clean_project/assets

          # 3. نسخ الكود الخاص بنا
          cp -r lib ../clean_project/
          cp -r assets ../clean_project/

          # 4. كتابة pubspec.yaml الخاص بنا
          cp pubspec.yaml ../clean_project/

          # 5. تعديل minSdkVersion إلى 21
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' ../clean_project/android/app/build.gradle

          # 6. إضافة flutterEmbedding meta-data للتأكد من v2
          sed -i 's|<application|<application android:name="io.flutter.embedding.android.FlutterActivity"|' ../clean_project/android/app/src/main/AndroidManifest.xml
          sed -i '/<\/application>/i\        <meta-data android:name="flutterEmbedding" android:value="2" />' ../clean_project/android/app/src/main/AndroidManifest.xml

          # 7. بناء APK
          cd ../clean_project
          flutter pub get
          flutter build apk --release

          # 8. نسخ الـ APK الناتج
          mkdir -p ${{ github.workspace }}/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
