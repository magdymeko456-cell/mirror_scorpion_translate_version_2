name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          cd /tmp
          mkdir -p clean
          cd /tmp/clean
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate .
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          # تعديل minSdk في kotlin.gradle
          sed -i 's/minSdk = [0-9]*/minSdk = 21/' android/build.gradle.kts android/app/build.gradle.kts 2>/dev/null || true
          # إضافة keep rules في build.gradle.kts
          sed -i '/buildTypes {/a\        release {\n            isMinifyEnabled = false\n            proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"))\n        }' android/app/build.gradle.kts 2>/dev/null || true
          cat android/app/build.gradle.kts | head -60
          flutter pub get
          flutter build apk --release --no-shrink
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
