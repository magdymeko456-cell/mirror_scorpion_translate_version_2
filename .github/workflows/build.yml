name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          set -e
          cd /tmp
          mkdir -p clean
          cd /tmp/clean
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate .
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          python3 $GITHUB_WORKSPACE/scripts/patch_gradle.py android/app/build.gradle.kts
          python3 $GITHUB_WORKSPACE/scripts/patch_manifest.py android/app/src/main/AndroidManifest.xml
          # Force SDK 35 in the newly created project
          sed -i 's/compileSdk = .*/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/targetSdk = .*/targetSdk = 35/g' android/app/build.gradle.kts
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/g' android/app/build.gradle || true
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/g' android/app/build.gradle || true
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
