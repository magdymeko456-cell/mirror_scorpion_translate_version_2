name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          set -e
          # Setup clean build environment
          rm -rf /tmp/clean_project
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean_project
          cd /tmp/clean_project
          
          # Sync project files
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # Configure Android
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # Initial pub get
          flutter pub get
          
          # Apply library patches
          echo "Applying patches to dependencies..."
          python3 $GITHUB_WORKSPACE/scripts/patch_dash_bubble.py
          python3 $GITHUB_WORKSPACE/scripts/patch_dash_bubble_resources.py
          python3 $GITHUB_WORKSPACE/scripts/patch_dash_bubble_compilesdk.py
          
          # Universal Namespace Fix for all cached libraries
          if [ -d "$HOME/.pub-cache/hosted/pub.dev" ]; then
            find $HOME/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i '/android {/a \    namespace "com.example.placeholder"' {} +
            
            # Specific fix for dash_bubble
            DASH_BUBBLE_GRADLE=$(find $HOME/.pub-cache/hosted/pub.dev -path "*/dash_bubble-*/android/build.gradle" | head -n 1)
            if [ ! -z "$DASH_BUBBLE_GRADLE" ]; then
              sed -i 's/namespace "com.example.placeholder"/namespace "dev.moaz.dash_bubble"/' "$DASH_BUBBLE_GRADLE"
            fi
          fi
          
          # Patch app level gradle
          python3 $GITHUB_WORKSPACE/scripts/patch_gradle.py android/app/build.gradle.kts || python3 $GITHUB_WORKSPACE/scripts/patch_gradle.py android/app/build.gradle
          python3 $GITHUB_WORKSPACE/scripts/patch_manifest.py android/app/src/main/AndroidManifest.xml
          
          # Set SDK Versions
          find android -name "build.gradle*" -exec sed -i 's/compileSdk .*/compileSdk = 36/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/targetSdk .*/targetSdk = 35/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion = 36/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion = 35/g' {} +
          
          # Build Release APK
          flutter build apk --release
          
          # Prepare artifact
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
