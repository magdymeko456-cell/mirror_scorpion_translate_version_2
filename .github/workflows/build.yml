name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean
          rm -rf /tmp/clean/lib /tmp/clean/assets
          cp -r lib /tmp/clean/
          cp -r assets /tmp/clean/
          cp pubspec.yaml /tmp/clean/
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' /tmp/clean/android/app/build.gradle
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/' /tmp/clean/android/app/build.gradle
          sed -i 's/compileSdkVersion [0-9]*/compileSdkVersion 34/' /tmp/clean/android/app/build.gradle
          cd /tmp/clean
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: ignore
