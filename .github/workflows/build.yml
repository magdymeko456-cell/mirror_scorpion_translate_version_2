name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Create and build
        run: |
          set -e
          cd /tmp
          mkdir -p clean
          cd /tmp/clean
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate .
          rm -rf lib assets
          cp -r $GITHUB_WORKSPACE/lib .
          cp -r $GITHUB_WORKSPACE/assets .
          cp $GITHUB_WORKSPACE/pubspec.yaml .
          
          # Run pub get first to download dependencies
          flutter pub get
          
          # FIX: Patch dependencies that are missing namespace (e.g., dash_bubble)
          # This is a common issue with AGP 8.0+
          PUB_CACHE_DIR=$(flutter pub cache repair --help | grep -o "/home/runner/.pub-cache" || echo "/home/runner/.pub-cache")
          if [ -d "$HOME/.pub-cache/hosted/pub.dev" ]; then
            find $HOME/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i '/android {/a \    namespace "com.example.placeholder"' {} +
            # Specifically fix dash_bubble if found
            DASH_BUBBLE_GRADLE=$(find $HOME/.pub-cache/hosted/pub.dev -path "*/dash_bubble-*/android/build.gradle" | head -n 1)
            if [ ! -z "$DASH_BUBBLE_GRADLE" ]; then
              sed -i 's/namespace "com.example.placeholder"/namespace "com.m7mdra.dash_bubble"/' "$DASH_BUBBLE_GRADLE"
            fi
          fi

          python3 $GITHUB_WORKSPACE/scripts/patch_gradle.py android/app/build.gradle.kts
          python3 $GITHUB_WORKSPACE/scripts/patch_manifest.py android/app/src/main/AndroidManifest.xml
          
          # Force SDK 35 in the newly created project
          find android -name "build.gradle*" -exec sed -i 's/compileSdk .*/compileSdk = 35/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/targetSdk .*/targetSdk = 35/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion = 35/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion = 35/g' {} +
          
          # Fix for any accidental double equals or missing spaces
          find android -name "build.gradle*" -exec sed -i 's/==/=/g' {} +
          find android -name "build.gradle*" -exec sed -i 's/compileSdk=/compileSdk = /g' {} +
          find android -name "build.gradle*" -exec sed -i 's/targetSdk=/targetSdk = /g' {} +
          
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: error
