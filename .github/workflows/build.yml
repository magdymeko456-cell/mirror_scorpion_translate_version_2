name: Mirror Scorpion Build
on:
  push:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.0'
      - name: Create and build
        run: |
          flutter create --org com.tetocollctionway --project-name mirror_scorpion_translate /tmp/clean
          rm -rf /tmp/clean/lib /tmp/clean/assets
          cp -r lib /tmp/clean/
          cp -r assets /tmp/clean/
          cp pubspec.yaml /tmp/clean/

          # Build gradle مكتوب مباشرة
          printf 'plugins {\n    id "com.android.application"\n    id "kotlin-android"\n    id "dev.flutter.flutter-gradle-plugin"\n}\nandroid {\n    namespace "com.tetocollctionway.mirror_scorpion_translate"\n    compileSdk 34\n    ndkVersion flutter.ndkVersion\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n    kotlinOptions { jvmTarget = "1.8" }\n    sourceSets { main.java.srcDirs += "src/main/kotlin" }\n    defaultConfig {\n        applicationId "com.tetocollctionway.mirror_scorpion_translate"\n        minSdk 21\n        targetSdk 34\n        versionCode 1\n        versionName "1.0"\n    }\n    buildTypes { release { signingConfig signingConfigs.debug } }\n}\nflutter { source "../.." }\ndependencies {}\n' > /tmp/clean/android/app/build.gradle

          printf '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n<uses-permission android:name="android.permission.INTERNET"/>\n<uses-permission android:name="android.permission.RECORD_AUDIO"/>\n<application\n    android:label="Mirror Scription"\n    android:icon="@mipmap/ic_launcher">\n    <activity android:name=".MainActivity"\n        android:exported="true"\n        android:launchMode="singleTop"\n        android:theme="@style/LaunchTheme"\n        android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"\n        android:hardwareAccelerated="true"\n        android:windowSoftInputMode="adjustResize">\n        <intent-filter>\n            <action android:name="android.intent.action.MAIN"/>\n            <category android:name="android.intent.category.LAUNCHER"/>\n        </intent-filter>\n    </activity>\n    <meta-data android:name="flutterEmbedding" android:value="2"/>\n</application>\n</manifest>\n' > /tmp/clean/android/app/src/main/AndroidManifest.xml

          printf 'org.gradle.jvmargs=-Xmx4G\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n' > /tmp/clean/android/gradle.properties

          cd /tmp/clean
          flutter pub get
          flutter build apk --release
          mkdir -p $GITHUB_WORKSPACE/output_apk
          cp build/app/outputs/flutter-apk/app-release.apk $GITHUB_WORKSPACE/output_apk/
      - uses: actions/upload-artifact@v4
        with:
          name: mirror-scorpion-release
          path: output_apk/app-release.apk
          if-no-files-found: ignore
